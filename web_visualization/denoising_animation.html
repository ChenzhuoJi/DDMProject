function loadSnapshotData() {
  const data = SNAPSHOT_DATA;
  if (!data) {
    document.getElementById('tokenGrid').innerHTML = '<div style="color:#a39c94;padding:20px;text-align:center;">正在加载数据...</div>';
    return null;
  }
  return data;
}

function parseSnapshotText(text) {
  var lines = text.split('\n');
  var rowMap = {};

  lines.forEach(function(line) {
    var m = line.match(/^t=([0-9.]+)/);
    if (!m) return;

    var t = parseFloat(m[1]);
    var idx = line.indexOf('):');
    if (idx === -1) return;
    var body = line.substring(idx + 2).trim();

    var segments = body.split(/(\[MASK\])/);
    var tokens = [];
    segments.forEach(function(seg) {
      if (seg === '[MASK]') {
        tokens.push(null);
      } else if (seg.trim()) {
        seg.trim().split(/\s+/).forEach(function(w) { tokens.push(w); });
      }
    });

    if (tokens.length === 0) return;
    rowMap[t] = tokens;
  });

  var sorted = Object.keys(rowMap).map(parseFloat).sort(function(a, b) { return b - a; });

  if (sorted.length < 2) {
    throw new Error('格式错误：至少需要 2 个时间步，且每步需包含文本');
  }

  var data = sorted.map(function(t) {
    var toks = rowMap[t];
    return {
      t: Math.round(t * 1000) / 1000,
      pct: Math.round((1 - t) * 1000) / 10,
      tokens: toks
    };
  });

  return data;
}

function reinitializeAnimation(data, filename) {
  stopPlay();
  currentIdx = 0;
  cleanSettle(document.getElementById('tokenGrid'));

  document.getElementById('snapshotCount').textContent = data.length + ' snapshots';
  document.getElementById('currentFile').textContent = filename || '';
  document.getElementById('statStep').textContent = '0 / ' + (data.length - 1);
  document.getElementById('statMask').textContent = '--';
  document.getElementById('statRevealed').textContent = '--';

  document.getElementById('subtitle').textContent = describeFile(filename);

  currentData = data;
  buildGrid(data);
  renderStep(data, 0);
}

function describeFile(name) {
  if (!name) return 'seed 42 · 1000步 · ddpm_cache';
  var parts = name.replace('.txt', '').split('_');
  if (parts[0] === 'snapshot' && parts[1] === 'seed')
    return 'seed ' + parts[2] + ' · 1000步 · ddpm_cache · length=256';
  if (parts[0] === 'snapshot' && parts[1] === 'steps')
    return parts[2] + '步 · seed=42 · ddpm_cache · length=256';
  if (parts[0] === 'snapshot' && parts[1] === 'length')
    return 'length=' + parts[2] + ' · seed=123 · ddpm_cache';
  return name;
}

function computeMaxTokenLengths(data, totalPos) {
  var maxLens = [];
  data.forEach(function(step) {
    var limit = step.tokens.length < totalPos ? step.tokens.length : totalPos;
    for (var i = 0; i < limit; i++) {
      var tok = step.tokens[i];
      var len = tok ? tok.length : 1;
      if (!maxLens[i] || len > maxLens[i]) maxLens[i] = len;
    }
  });
  return maxLens;
}

function buildGrid(data) {
  var grid = document.getElementById('tokenGrid');
  grid.innerHTML = '';
  cells = [];

  var totalPos = data[data.length - 1].tokens.length;
  var maxLens = computeMaxTokenLengths(data, totalPos);

  for (var i = 0; i < totalPos; i++) {
    var cell = document.createElement('span');
    cell.className = 'token mask';
    cell.textContent = '\u25A0';
    cell.title = 'Position ' + i + ': [MASK]';
    cell.style.width = 'calc(' + (maxLens[i] + 1) + 'ch + 2px)';
    cell.dataset.state = 'mask';
    grid.appendChild(cell);
    cells.push(cell);
  }
}

function updatePhaseAndStats(step, data, idx, totalPos) {

  for (var i = 0; i < limit; i++) {
    if (step.tokens[i] === null) maskCount++;
  }
  var revealed = limit - maskCount;
  var pct = limit > 0 ? (revealed / limit * 100).toFixed(0) : 0;

  document.getElementById('timeLabel').textContent = 't = ' + step.t.toFixed(3) + ' \u00B7 ' + step.pct.toFixed(0) + '%';
  document.getElementById('progressFill').style.width = ((1 - step.t) * 100) + '%';
  document.getElementById('statStep').textContent = idx + ' / ' + (data.length - 1);
  document.getElementById('statMask').textContent = maskCount;
  document.getElementById('statRevealed').textContent = revealed + ' (' + pct + '%)';

  var t = step.t;
  toggleActive('phaseSeg0', t > 0.50);
  toggleActive('phaseSeg1', t > 0.10 && t <= 0.50);
  toggleActive('phaseSeg2', t <= 0.10);
  toggleActive('phaseLabel0', t > 0.50);
  toggleActive('phaseLabel1', t > 0.10 && t <= 0.50);
  toggleActive('phaseLabel2', t <= 0.10);

function toggleActive(id, cond) {

        cell.title = 'Position ' + i + ': "' + tok + '"';
        cell.dataset.state = 'revealed';
      } else {
        if (cell.textContent !== display) {
          cell.textContent = display;
          cell.title = 'Position ' + i + ': "' + tok + '"';
        }
      }
    }
  }

  if (allRevealed && idx === data.length - 1) {
    animateSettle(grid);
  } else {
    cleanSettle(grid);
  }

  updatePhaseAndStats(step, data, idx, totalPos);
}

function animateSettle(grid) {
  var old = grid.querySelector('.settle-text');
  if (old) old.remove();

  var parts = [];
  cells.forEach(function(c) {
    if (c.dataset.state === 'revealed') {
      parts.push(c.textContent);
    }
  });
  var text = parts.join(' ');

  var overlay = document.createElement('div');
  overlay.className = 'settle-text';
  overlay.textContent = text;
  grid.appendChild(overlay);

  grid.classList.add('settled');

  requestAnimationFrame(function() {
    overlay.classList.add('visible');
  });
}

function cleanSettle(grid) {
  grid.classList.remove('settled');
  var overlay = grid.querySelector('.settle-text');
  if (overlay) overlay.remove();
  cells.forEach(function(c) {
    c.style.opacity = '';
    c.style.transition = '';
  });
}

function animate(data) {
  if (isPlaying) {
    if (currentIdx < data.length - 1) {
      currentIdx++;
      renderStep(data, currentIdx);
    } else {
      stopPlay();
    }
  }
}

function startPlay(data) {
  if (currentIdx >= data.length - 1) {
    currentIdx = 0;
    renderStep(data, 0);
  }
  isPlaying = true;
  var playBtn = document.getElementById('btnPlay');
  playBtn.textContent = '\u23F8 Pause';
  playBtn.className = 'primary playing';

  var speed = parseInt(document.getElementById('speedSlider').value);
  var interval = Math.max(100, 800 - speed * 70);

  if (playInterval) clearInterval(playInterval);
  playInterval = setInterval(function() { animate(data); }, interval);
}

function stopPlay() {
  isPlaying = false;
  var playBtn = document.getElementById('btnPlay');
  playBtn.textContent = '\u25B6 Play';
  playBtn.className = 'primary';
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
  }
}

function togglePlay(data) {
  if (isPlaying) stopPlay();
  else startPlay(data);
}

document.addEventListener('DOMContentLoaded', function() {
  var data = loadSnapshotData();
  if (!data || data.length === 0) {
    document.getElementById('tokenGrid').innerHTML = '<div style="width:100%;padding:20px;text-align:center;color:#a39c94;">请先用 plot_snapshot_animation.py 生成数据</div>';
    return;
  }

  reinitializeAnimation(data, '');

  function withData(fn) {
    return function() { fn(currentData); };
  }

  document.getElementById('btnPlay').addEventListener('click', withData(togglePlay));
  document.getElementById('btnNext').addEventListener('click', withData(function(d) {
    stopPlay();
    if (currentIdx < d.length - 1) { currentIdx++; renderStep(d, currentIdx); }
  }));
  document.getElementById('btnPrev').addEventListener('click', withData(function(d) {
    stopPlay();
    if (currentIdx > 0) { currentIdx--; renderStep(d, currentIdx); }
  }));
  document.getElementById('btnReset').addEventListener('click', withData(function(d) {
    stopPlay();
    currentIdx = 0;
    renderStep(d, 0);
  }));

  document.getElementById('progressTrack').addEventListener('click', function(e) {
    stopPlay();
    var rect = e.currentTarget.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    currentIdx = Math.round(pct * (currentData.length - 1));
    renderStep(currentData, currentIdx);
  });

  document.getElementById('speedSlider').addEventListener('input', function(e) {
    var val = e.target.value;
    document.getElementById('speedLabel').textContent = val + '\u00D7';
    if (isPlaying) {
      stopPlay();
      startPlay(currentData);
    }
  });

  document.getElementById('btnLoadFile').addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var parsed = parseSnapshotText(ev.target.result);
        reinitializeAnimation(parsed, file.name);
      } catch (err) {
        document.getElementById('tokenGrid').innerHTML = '<div style="width:100%;padding:20px;text-align:center;color:#b64f35;">文件解析失败: ' + err.message + '</div>';
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  document.addEventListener('keydown', function(e) {
    if (!currentData) return;
    if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); togglePlay(currentData); }
    if (e.key === 'ArrowRight') {
      e.preventDefault(); stopPlay();
      if (currentIdx < currentData.length - 1) { currentIdx++; renderStep(currentData, currentIdx); }
    }
    if (e.key === 'ArrowLeft') {
      e.preventDefault(); stopPlay();
      if (currentIdx > 0) { currentIdx--; renderStep(currentData, currentIdx); }
    }
  });
});
</script>
</body>
</html>
